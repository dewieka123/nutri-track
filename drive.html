<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro NAS Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #121212; --bg-panel: #1e1e1e; --border: #333;
            --primary: #4facfe; --hover: #2a2a2a; --text: #e0e0e0; --text-muted: #888;
        }

        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body); color: var(--text); user-select: none;
        }

        .container {
            max-width: 1200px; margin: 0 auto; background: var(--bg-panel);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-height: 80vh;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px;
        }
        .header h2 { margin: 0; display: flex; align-items: center; gap: 10px; }
        .btn-group { display: flex; gap: 10px; }
        
        button, .btn-upload {
            background-color: #2c2c2c; border: 1px solid var(--border); color: var(--text);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        button:hover, .btn-upload:hover { background-color: var(--hover); border-color: var(--primary); }
        .btn-cmd { background-color: #000; color: #0f0; border-color: #0f0; }
        .btn-cmd:hover { background-color: #0f0; color: #000; }
        input[type="file"] { display: none; }

        .breadcrumb { display: flex; gap: 8px; margin-bottom: 20px; font-size: 0.95rem; color: var(--text-muted); }
        .crumb { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: 0.2s; }
        .crumb:hover { background: var(--hover); color: var(--text); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .item {
            background: var(--bg-body); border: 1px solid var(--border); border-radius: 8px;
            padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.1s;
        }
        .item:hover { border-color: var(--primary); background: var(--hover); }
        .icon { font-size: 3rem; margin-bottom: 10px; }
        .fa-folder { color: #f1c40f; } .fa-file { color: #ecf0f1; }
        .fa-image { color: #e74c3c; } .fa-video { color: #9b59b6; } .fa-music { color: #2ecc71; }
        .name { font-size: 0.85rem; word-break: break-all; }

        #contextMenu {
            position: absolute; background: #252526; border: 1px solid var(--border);
            border-radius: 6px; width: 180px; display: none; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
        }
        .ctx-item { padding: 10px 15px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
        .ctx-item:hover { background: var(--primary); color: #000; }

        #pasteBar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #252526; border: 1px solid var(--primary); padding: 15px 25px;
            border-radius: 8px; display: none; align-items: center; gap: 15px; z-index: 900;
        }

        #previewModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        #previewContent { max-width: 90%; max-height: 85vh; border-radius: 4px; border: 1px solid #444; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: #fff; cursor: pointer; }

        #termModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .term-box {
            background: #000; width: 80%; max-width: 900px; height: 65vh;
            border: 2px solid #0f0; border-radius: 8px; display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            font-family: 'Courier New', Courier, monospace;
        }
        .term-header {
            background: #111; padding: 10px 20px; display: flex; justify-content: space-between;
            color: #0f0; border-bottom: 1px solid #0f0; font-weight: bold; align-items: center;
        }
        .term-output {
            flex: 1; padding: 15px; overflow-y: auto; color: #0f0; white-space: pre-wrap;
            font-size: 0.95rem; line-height: 1.4;
        }
        .term-input-line { display: flex; padding: 10px 15px; border-top: 1px solid #0f0; color: #0f0; align-items: center;}
        .term-input-line input {
            flex: 1; background: transparent; border: none; color: #0f0; margin-left: 10px;
            font-family: 'Courier New', Courier, monospace; outline: none; font-size: 1rem; font-weight: bold;
        }

        /* LOADER / UPLOAD PROGRESS */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000;
        }
        #loader-text {
            color: var(--primary); font-size: 1.5rem; font-weight: bold; margin-left: 15px;
        }
    </style>
</head>
<body onclick="hideContextMenu()">

    <div id="loader">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary);"></i>
        <div id="loader-text">Processing...</div>
    </div>

    <div id="termModal">
        <div class="term-box" onclick="event.stopPropagation()">
            <div class="term-header">
                <span><i class="fa-solid fa-terminal"></i> NAS Remote Shell</span>
                <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:1.2rem;" onclick="closeTerminal()"></i>
            </div>
            <div class="term-output" id="termOutput">
NAS System Server [Version 1.0]
Web Terminal Ready. Type your CMD command.
<br><br></div>
            <div class="term-input-line">
                <span>PS ></span>
                <input type="text" id="cmdInput" onkeypress="executeCmd(event)" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <div id="previewModal">
        <span class="close-btn" onclick="closePreview()">&times;</span>
        <div id="previewContainer" style="display:flex; justify-content:center; width:100%;"></div>
    </div>

    <div class="container">
        <div class="header">
            <h2><i class="fa-solid fa-server"></i> Local NAS</h2>
            <div class="btn-group">
                <button class="btn-cmd" onclick="openTerminal(event)"><i class="fa-solid fa-terminal"></i> Terminal</button>
                <button onclick="createFolder()"><i class="fa-solid fa-folder-plus"></i> New Folder</button>
                <label class="btn-upload">
                    <i class="fa-solid fa-upload"></i> Upload
                    <input type="file" id="fileInput" onchange="uploadFile(this)" multiple>
                </label>
            </div>
        </div>

        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="grid" id="fileList"></div>
    </div>

    <div id="contextMenu">
        <div class="ctx-item" onclick="ctxAction('preview')"><i class="fa-solid fa-eye"></i> Preview</div>
        <div class="ctx-item" onclick="ctxAction('download')"><i class="fa-solid fa-download"></i> Download</div>
        <div class="ctx-item" onclick="ctxAction('rename')"><i class="fa-solid fa-pen"></i> Rename</div>
        <div class="ctx-item" onclick="ctxAction('copy')"><i class="fa-solid fa-copy"></i> Copy</div>
        <div class="ctx-item" onclick="ctxAction('cut')"><i class="fa-solid fa-scissors"></i> Cut</div>
        <div class="ctx-item delete" onclick="ctxAction('delete')"><i class="fa-solid fa-trash"></i> Delete</div>
    </div>

    <div id="pasteBar">
        <span id="clipboardText" style="color:#ccc;">Clipboard...</span>
        <button onclick="pasteItem()" style="background:var(--primary); color:#000; border:none;">PASTE DISINI</button>
        <button onclick="clearClipboard()" style="border-color:#e74c3c; color:#e74c3c;">BATAL</button>
    </div>

    <script>
        let currentPath = '';
        let clipboard = null;
        let selectedItem = null;

        // --- WEB TERMINAL LOGIC ---
        function openTerminal(event) {
            event.stopPropagation();
            document.getElementById('termModal').style.display = 'flex';
            document.getElementById('cmdInput').focus();
        }

        function closeTerminal() { document.getElementById('termModal').style.display = 'none'; }

        async function executeCmd(event) {
            if (event.key === 'Enter') {
                const inputField = document.getElementById('cmdInput');
                const cmd = inputField.value;
                if (!cmd.trim()) return;

                const outputArea = document.getElementById('termOutput');
                outputArea.innerHTML += `<div><span style="color:#fff">PS ></span> ${escapeHtml(cmd)}</div>`;
                inputField.value = ''; 
                
                const loadingId = "load_" + Date.now();
                outputArea.innerHTML += `<div id="${loadingId}" style="color:#888">Executing...</div>`;
                outputArea.scrollTop = outputArea.scrollHeight;

                try {
                    const res = await fetch('/api/cmd', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ command: cmd })
                    });
                    const data = await res.json();
                    document.getElementById(loadingId).remove();
                    outputArea.innerHTML += `<div style="color:#aaa; margin-bottom:15px;">${escapeHtml(data.output)}</div>`;
                } catch(e) {
                    document.getElementById(loadingId).remove();
                    outputArea.innerHTML += `<div style="color:red; margin-bottom:15px;">Error: Gagal ke Server.</div>`;
                }
                outputArea.scrollTop = outputArea.scrollHeight;
            }
        }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        // --- FILE MANAGER LOGIC ---
        async function loadFiles(path = '') {
            currentPath = path; renderBreadcrumb();
            try {
                const res = await fetch(`/api/list?path=${encodeURIComponent(path)}`);
                const data = await res.json(); renderGrid(data);
            } catch (err) { console.error(err); }
        }

        function renderGrid(files) {
            const grid = document.getElementById('fileList'); grid.innerHTML = '';
            if (files.length === 0) { grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#666">Folder Kosong</p>'; return; }
            files.forEach(f => {
                const item = document.createElement('div'); item.className = 'item';
                let icon = 'fa-file'; const ext = f.name.split('.').pop().toLowerCase();
                if(f.type === 'folder') icon = 'fa-folder';
                else if(['jpg','jpeg','png','gif'].includes(ext)) icon = 'fa-image';
                else if(['mp4','mkv'].includes(ext)) icon = 'fa-video';
                else if(['mp3','wav'].includes(ext)) icon = 'fa-music';

                item.innerHTML = `<div class="icon"><i class="fa-solid ${icon}"></i></div><div class="name">${f.name}</div>`;
                item.onclick = () => {
                    if (f.type === 'folder') loadFiles(currentPath ? currentPath + '/' + f.name : f.name);
                    else if (isPreviewable(f.name)) previewFile(f.name);
                    else window.open(getDownloadUrl(f.name), '_blank');
                };
                item.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, f); };
                grid.appendChild(item);
            });
        }

        // --- MULTIPLE UPLOAD (SEQUENTIAL) ---
        async function uploadFile(input) {
            if(!input.files.length) return;
            const total = input.files.length;
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loader-text');
            
            loader.style.display = 'flex';

            // Kirim file satu per satu secara berurutan
            for (let i = 0; i < total; i++) {
                loaderText.innerText = `Uploading ${i + 1} of ${total}...`;
                const formData = new FormData();
                formData.append('file', input.files[i]);
                formData.append('path', currentPath);
                
                try {
                    await fetch('/api/upload', { method: 'POST', body: formData });
                } catch(e) { console.error("Error upload file", i); }
            }

            // Selesai upload semua
            input.value = ''; 
            loader.style.display = 'none';
            loaderText.innerText = 'Processing...'; 
            loadFiles(currentPath);
        }

        function showContextMenu(e, file) {
            selectedItem = file; const menu = document.getElementById('contextMenu');
            menu.style.display = 'flex'; let x = e.pageX; let y = e.pageY;
            if (x + 180 > window.innerWidth) x -= 180;
            menu.style.left = x + 'px'; menu.style.top = y + 'px';
        }
        function hideContextMenu() { document.getElementById('contextMenu').style.display = 'none'; }

        function ctxAction(action) {
            if (!selectedItem) return;
            const fullPath = currentPath ? currentPath + '/' + selectedItem.name : selectedItem.name;

            if (action === 'preview') {
                if(isPreviewable(selectedItem.name)) previewFile(selectedItem.name); else alert("Tidak mendukung preview.");
            } else if (action === 'download') {
                if(selectedItem.type === 'folder') alert("Folder belum didukung."); else window.location.href = getDownloadUrl(selectedItem.name);
            } else if (action === 'delete') {
                if(confirm(`Yakin hapus ${selectedItem.name}?`)) deleteItem(fullPath);
            } else if (action === 'rename') {
                renameItem(selectedItem.name, fullPath);
            } else if (action === 'copy' || action === 'cut') {
                clipboard = { action: action, path: fullPath, name: selectedItem.name }; showPasteBar();
            }
            hideContextMenu();
        }

        async function renameItem(oldName, oldPath) {
            const newName = prompt("Nama baru:", oldName);
            if (!newName || newName === oldName) return;
            document.getElementById('loader').style.display = 'flex';
            await fetch('/api/rename', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ old_path: oldPath, new_name: newName })
            });
            document.getElementById('loader').style.display = 'none';
            loadFiles(currentPath);
        }

        function getDownloadUrl(filename) { return `/api/download?path=${encodeURIComponent(currentPath ? currentPath + '/' + filename : filename)}`; }

        async function deleteItem(path) { 
            document.getElementById('loader').style.display = 'flex';
            await fetch('/api/delete', { method: 'POST', body: JSON.stringify({ path: path }) }); 
            document.getElementById('loader').style.display = 'none';
            loadFiles(currentPath); 
        }

        async function createFolder() {
            const name = prompt("Nama Folder:"); if(!name) return;
            await fetch('/api/mkdir', { method: 'POST', body: JSON.stringify({ path: currentPath ? currentPath + '/' + name : name }) }); 
            loadFiles(currentPath);
        }

        function showPasteBar() {
            document.getElementById('pasteBar').style.display = 'flex';
            document.getElementById('clipboardText').innerText = `${clipboard.action.toUpperCase()}: ${clipboard.name}`;
        }
        function clearClipboard() { clipboard = null; document.getElementById('pasteBar').style.display = 'none'; }
        
        async function pasteItem() {
            if(!clipboard) return;
            document.getElementById('loader').style.display = 'flex';
            await fetch('/api/paste', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: clipboard.action, source: clipboard.path, destination: currentPath })
            });
            document.getElementById('loader').style.display = 'none';
            clearClipboard(); loadFiles(currentPath);
        }

        function isPreviewable(filename) { return ['jpg','jpeg','png','gif','mp4','webm','mp3'].includes(filename.split('.').pop().toLowerCase()); }
        
        function previewFile(filename) {
            const modal = document.getElementById('previewModal'); const container = document.getElementById('previewContainer');
            const url = getDownloadUrl(filename); const ext = filename.split('.').pop().toLowerCase();
            container.innerHTML = '';
            if(['jpg','jpeg','png','gif'].includes(ext)) container.innerHTML = `<img src="${url}" id="previewContent">`;
            else if(['mp4','webm'].includes(ext)) container.innerHTML = `<video src="${url}" controls autoplay id="previewContent"></video>`;
            else if(['mp3'].includes(ext)) container.innerHTML = `<audio src="${url}" controls autoplay style="width:400px; margin-top:20px"></audio>`;
            modal.style.display = 'flex';
        }
        function closePreview() { document.getElementById('previewModal').style.display = 'none'; document.getElementById('previewContainer').innerHTML = ''; }

        function renderBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = `<div class="crumb" onclick="loadFiles('')"><i class="fa-solid fa-house"></i> Home</div>`;
            if(!currentPath) return;
            const parts = currentPath.split('/'); let build = '';
            parts.forEach(p => { build += (build ? '/' : '') + p; bc.innerHTML += ` / <div class="crumb" onclick="loadFiles('${build}')">${p}</div>`; });
        }

        loadFiles();
    </script>
</body>
</html>
